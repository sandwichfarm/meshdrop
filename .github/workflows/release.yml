name: Release

on:
  push:
    tags:
      - "v0.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release metadata
        id: release
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "tag=${GITHUB_REF_NAME}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Build service worker
        run: npm run build:service-worker

      - name: Create release artifacts
        run: |
          version="${{ steps.release.outputs.version }}"
          mkdir -p dist

          git archive \
            --format=tar.gz \
            --prefix="meshdrop-${version}/" \
            --output="dist/meshdrop-source-${version}.tar.gz" \
            "${GITHUB_SHA}"

          tar -czf "dist/meshdrop-node-${version}.tar.gz" \
            package.json \
            package-lock.json \
            server \
            public \
            scripts \
            Dockerfile \
            docker-compose.yml \
            docker-compose-coturn.yml \
            docker-compose-dev.yml \
            fips.yaml \
            README.md \
            LICENSE

          npm run build:spa -- --version "${version}" --out-dir dist
          npm run build:desktop -- --version "${version}" --out-dir dist
          npm run build:ios -- --version "${version}" --out-dir dist
          npm run build:android -- --version "${version}" --out-dir dist
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          npm run build:start9 -- --version "${version}" --out-dir dist --image "${image}:${GITHUB_REF_NAME}-start9"
          npm run build:umbrel -- --version "${version}" --out-dir dist --image "${image}:${GITHUB_REF_NAME}-umbrel"

          sha256sum dist/meshdrop-*.tar.gz > dist/SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            dist/* \
            --title "MeshDrop ${{ steps.release.outputs.tag }}" \
            --generate-notes \
            --prerelease \
            --verify-tag

  container-images:
    name: GHCR target image (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        target: [standalone, start9, umbrel]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare image metadata
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          version="${GITHUB_REF_NAME#v}"
          target="${{ matrix.target }}"
          {
            echo "image=${image}"
            echo "version=${version}"
            echo "tag=${GITHUB_REF_NAME}"
            echo "target=${target}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push multi-arch target image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            MESH_DROP_COMMIT=${{ github.sha }}
            MESHDROP_TARGET=${{ steps.image.outputs.target }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.image.outputs.tag }}
            org.opencontainers.image.title=MeshDrop ${{ steps.image.outputs.target }}
            farm.sandwich.meshdrop.target=${{ steps.image.outputs.target }}
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}-${{ steps.image.outputs.target }}
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}-${{ steps.image.outputs.target }}

  verify-release:
    name: Release readback
    needs: container-images
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/release-verify.yml
    with:
      tag: ${{ github.ref_name }}

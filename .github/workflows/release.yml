name: Release

on:
  push:
    tags:
      - "v0.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release metadata
        id: release
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "tag=${GITHUB_REF_NAME}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Build service worker
        run: npm run build:service-worker

      - name: Create release artifacts
        run: |
          version="${{ steps.release.outputs.version }}"
          mkdir -p dist

          git archive \
            --format=tar.gz \
            --prefix="meshdrop-${version}/" \
            --output="dist/meshdrop-source-${version}.tar.gz" \
            "${GITHUB_SHA}"

          tar -czf "dist/meshdrop-node-${version}.tar.gz" \
            package.json \
            package-lock.json \
            server \
            public \
            scripts \
            Dockerfile \
            docker-compose.yml \
            docker-compose-coturn.yml \
            docker-compose-dev.yml \
            fips.yaml \
            README.md \
            LICENSE

          npm run build:spa -- --version "${version}" --out-dir dist

          sha256sum dist/meshdrop-*.tar.gz > dist/SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            dist/* \
            --title "MeshDrop ${{ steps.release.outputs.tag }}" \
            --generate-notes \
            --prerelease \
            --verify-tag

name: CI

on:
  pull_request:
    branches: ["master"]
    paths-ignore:
      - ".planning/**"
      - "docs/**"
      - "**/*.md"
  push:
    branches: ["master"]
    paths-ignore:
      - ".planning/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:
    inputs:
      spa_public_relay_urls:
        description: "Optional comma/space-separated public relay URLs for SPA public relay UAT"
        required: false
        default: ""
      spa_webkit_transfer:
        description: "Run manual WebKit two-page SPA transfer UAT"
        required: false
        default: "false"
      docker_public_relay_urls:
        description: "Optional comma/space-separated public relay URLs for Docker two-host relay UAT"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-change-scope:
    name: CI change scope
    runs-on: ubuntu-latest
    outputs:
      runtime: ${{ steps.classify.outputs.runtime }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          runtime=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            runtime=true
          else
            case "${{ github.event_name }}" in
              pull_request)
                base="${{ github.event.pull_request.base.sha }}"
                head="${{ github.event.pull_request.head.sha }}"
                ;;
              push)
                base="${{ github.event.before }}"
                head="${{ github.sha }}"
                if [[ "${base}" =~ ^0+$ ]]; then
                  base="${head}^"
                fi
                ;;
              *)
                base="${{ github.sha }}^"
                head="${{ github.sha }}"
                ;;
            esac

            while IFS= read -r path; do
              case "${path}" in
                public/**|server/**|scripts/**|packaging/**|native/**|test/e2e*|test/*package*|test/*smoke*|Dockerfile|docker-compose.yml|package.json|package-lock.json)
                  runtime=true
                  ;;
              esac
            done < <(git diff --name-only "${base}" "${head}")
          fi

          echo "runtime=${runtime}" >> "${GITHUB_OUTPUT}"

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install desktop native shell dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  browser-transfer:
    name: Browser transfer smoke
    runs-on: ubuntu-latest
    needs: [ci-change-scope, unit]
    if: needs.ci-change-scope.outputs.runtime == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser transfer smoke
        run: npm run test:e2e

  spa-browser-matrix:
    name: SPA browser matrix (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [ci-change-scope, unit]
    if: needs.ci-change-scope.outputs.runtime == 'true'
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run SPA artifact smoke
        env:
          PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
        run: npm run test:spa-artifact

  target-artifacts:
    name: Target artifact transfer smoke
    runs-on: ubuntu-latest
    needs: [ci-change-scope, unit]
    if: needs.ci-change-scope.outputs.runtime == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run target artifact transfer smoke
        run: npm run test:target-artifacts

  desktop-chromium-shell:
    name: Desktop Chromium shell and installer smoke
    runs-on: ubuntu-latest
    needs: [ci-change-scope, unit]
    if: needs.ci-change-scope.outputs.runtime == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Desktop Chromium shell transfer smoke
        run: npm run test:desktop-chromium

      - name: Run bundled Desktop Chromium transfer smoke
        run: npm run test:desktop-chromium-bundled

      - name: Run signed Desktop installer smoke
        run: npm run test:desktop-installer

  mobile-native-source-artifacts:
    name: Mobile native source artifact smoke
    runs-on: ubuntu-latest
    needs: [ci-change-scope, unit]
    if: needs.ci-change-scope.outputs.runtime == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and inspect mobile native-source artifacts
        run: |
          set -euo pipefail
          out_dir="$(mktemp -d)"

          npm run build:ios:native-source -- --version 0.0.0-ci --out-dir "${out_dir}"
          npm run build:android:native-source -- --version 0.0.0-ci --out-dir "${out_dir}"

          tar -tzf "${out_dir}/meshdrop-ios-native-source-0.0.0-ci.tar.gz" \
            | grep -E 'native/ios/MeshDrop/(MeshDropViewController.swift|Resources/meshdrop/index.html)$'

          tar -tzf "${out_dir}/meshdrop-android-native-source-0.0.0-ci.tar.gz" \
            | grep -E 'native/android/app/src/main/(AndroidManifest.xml|assets/meshdrop/index.html|java/farm/sandwich/meshdrop/MainActivity.java)$'

  ios-xcode-build:
    name: iOS Xcode native-source and simulator app smoke
    runs-on: macos-15
    needs: [ci-change-scope, unit]
    if: needs.ci-change-scope.outputs.runtime == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build generated iOS project with Xcode
        run: npm run test:ios-xcode-build

      - name: Build unsigned iOS Simulator app package
        run: npm run test:ios-simulator-app

  android-apk-artifact:
    name: Android APK artifact smoke
    runs-on: ubuntu-latest
    needs: [ci-change-scope, unit]
    if: needs.ci-change-scope.outputs.runtime == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and inspect Android APK artifact
        run: npm run test:android-apk

  android-webview-emulator:
    name: Android WebView emulator smokes
    runs-on: ubuntu-latest
    needs: [ci-change-scope, unit]
    if: needs.ci-change-scope.outputs.runtime == 'true'
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Android API 36 AVD
        run: |
          set -euo pipefail
          export ANDROID_AVD_HOME="${RUNNER_TEMP}/android-avd"
          mkdir -p "${ANDROID_AVD_HOME}"
          echo "ANDROID_AVD_HOME=${ANDROID_AVD_HOME}" >> "${GITHUB_ENV}"
          sdkmanager="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          avdmanager="${ANDROID_HOME}/cmdline-tools/latest/bin/avdmanager"
          yes | "${sdkmanager}" --licenses >/dev/null || true
          "${sdkmanager}" "platform-tools" "emulator" "platforms;android-36" "system-images;android-36;google_apis;x86_64"
          echo "no" | "${avdmanager}" create avd \
            --force \
            --name meshdrop_ci_api_36 \
            --package "system-images;android-36;google_apis;x86_64" \
            --device pixel_6

      - name: Run Android WebView capability smoke
        env:
          MESHDROP_ANDROID_AVD: meshdrop_ci_api_36
          MESHDROP_ANDROID_EMULATOR_PORT: "5554"
          MESHDROP_ANDROID_BOOT_TIMEOUT_MS: "300000"
        run: npm run test:android-webview-capabilities

      - name: Run Android picker UI emulator smoke
        env:
          MESHDROP_ANDROID_AVD: meshdrop_ci_api_36
          MESHDROP_ANDROID_EMULATOR_PORT: "5554"
          MESHDROP_ANDROID_BOOT_TIMEOUT_MS: "300000"
        run: npm run test:android-picker-ui

  android-release-apk-artifact:
    name: Android release APK artifact smoke
    runs-on: ubuntu-latest
    needs: [ci-change-scope, unit]
    if: needs.ci-change-scope.outputs.runtime == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and inspect Android release APK artifact
        run: npm run test:android-release-apk

  spa-public-relay-uat:
    name: SPA public relay UAT (${{ matrix.browser }})
    if: github.event_name == 'workflow_dispatch' && inputs.spa_public_relay_urls != ''
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run SPA public relay UAT
        env:
          MESHDROP_SPA_PUBLIC_RELAY_URLS: ${{ inputs.spa_public_relay_urls }}
          PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
        run: npm run test:spa-artifact

  spa-webkit-transfer-uat:
    name: SPA WebKit transfer UAT
    if: github.event_name == 'workflow_dispatch' && inputs.spa_webkit_transfer == 'true'
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install WebKit
        run: npx playwright install --with-deps webkit

      - name: Run SPA WebKit transfer UAT
        env:
          MESHDROP_SPA_WEBKIT_TRANSFER: "1"
          PLAYWRIGHT_BROWSER: webkit
        run: npm run test:spa-artifact

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    needs: [ci-change-scope, unit]
    if: needs.ci-change-scope.outputs.runtime == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Docker smoke
        run: npm run test:docker

  docker-public-relay-uat:
    name: Docker public relay UAT
    if: github.event_name == 'workflow_dispatch' && inputs.docker_public_relay_urls != ''
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Docker public relay UAT
        env:
          MESHDROP_DOCKER_PUBLIC_RELAY_URLS: ${{ inputs.docker_public_relay_urls }}
        run: npm run test:docker:two-host

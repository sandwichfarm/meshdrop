name: CI

on:
  pull_request:
    branches: ["master"]
    paths-ignore:
      - ".planning/**"
      - "docs/**"
      - "**/*.md"
  push:
    branches: ["master"]
    paths-ignore:
      - ".planning/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:
    inputs:
      spa_public_relay_urls:
        description: "Optional comma/space-separated public relay URLs for SPA public relay UAT"
        required: false
        default: ""
      spa_webkit_transfer:
        description: "Run manual WebKit two-page SPA transfer UAT"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  browser-transfer:
    name: Browser transfer smoke
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser transfer smoke
        run: npm run test:e2e

  spa-browser-matrix:
    name: SPA browser matrix (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run SPA artifact smoke
        env:
          PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
        run: npm run test:spa-artifact

  spa-public-relay-uat:
    name: SPA public relay UAT (${{ matrix.browser }})
    if: github.event_name == 'workflow_dispatch' && inputs.spa_public_relay_urls != ''
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run SPA public relay UAT
        env:
          MESHDROP_SPA_PUBLIC_RELAY_URLS: ${{ inputs.spa_public_relay_urls }}
          PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
        run: npm run test:spa-artifact

  spa-webkit-transfer-uat:
    name: SPA WebKit transfer UAT
    if: github.event_name == 'workflow_dispatch' && inputs.spa_webkit_transfer == 'true'
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install WebKit
        run: npx playwright install --with-deps webkit

      - name: Run SPA WebKit transfer UAT
        env:
          MESHDROP_SPA_WEBKIT_TRANSFER: "1"
          PLAYWRIGHT_BROWSER: webkit
        run: npm run test:spa-artifact

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Docker smoke
        run: npm run test:docker

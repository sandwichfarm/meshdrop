services:
  meshdrop:
    build:
      context: .
      args:
        MESH_DROP_COMMIT: ${MESH_DROP_COMMIT:-local}
    image: meshdrop:local
    container_name: meshdrop
    restart: unless-stopped
    environment:
      - PUID=1000 # UID to run the application as
      - PGID=1000 # GID to run the application as
      - WS_FALLBACK=true # Set to true to enable websocket fallback if the peer to peer WebRTC connection is not available to the client.
      - RATE_LIMIT=true # Set to true to limit clients to 1000 requests per 5 min.
      - RTC_CONFIG=false # Set to the path of a file that specifies the STUN/TURN servers.
      - DEBUG_MODE=true # Set to true to debug container and peer connections.
      - NOSTR_RELAYS=wss://bucket.coracle.social # Relay list for Nostr WEB-RTC signaling and announcements.
      - MESHDROP_ADMIN_PUBKEY=e771af0b05c8e95fcdf6feb3500544d2fb1ccd384788e9f490bb3ee28e # Shared-instance admin pubkey allowed to sign server-side settings changes.
      - BLOSSOM_SERVERS= # Comma-separated Blossom servers for optional storage-backed transfers.
      - FIPS_DISCOVERY=true # Run and use the FIPS daemon inside this container.
      - FIPS_CONFIG=/etc/fips/fips.yaml # FIPS daemon config mounted from ./fips.yaml.
      - POLLEN_TRANSFER=true # Run and use the Pollen daemon inside this container.
      - PLN_DIR=/var/lib/meshdrop/pln # In-container Pollen state directory.
      - POLLEN_PORT=60611 # Pollen QUIC listen port.
      - TZ=Etc/UTC # Time Zone
      - MESHDROP_PUBLIC_DISCOVERY=true
      - MESHDROP_PUBLIC_DISCOVERY_ROOM=meshdrop-local
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./fips.yaml:/etc/fips/fips.yaml:ro
      - pollen-data:/var/lib/meshdrop/pln
    ports:
      - "3000:3000" # Web UI, exposed to this LAN for local-device testing.
      - "2121:2121/udp" # FIPS UDP transport.
      - "8443:8443" # FIPS TCP transport.
      - "60611:60611/udp" # Pollen QUIC transport.

volumes:
  pollen-data:

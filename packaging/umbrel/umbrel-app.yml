manifestVersion: 1
id: meshdrop
category: files
name: MeshDrop
version: "__MESHDROP_VERSION__"
tagline: Share files across WebRTC and Nostr-connected peers
description: >-
  MeshDrop is a browser-based file sharing service for local peers and Nostr-connected peers. The Umbrel package runs the
  server-backed target with runtime feature negotiation, Nostr WebRTC discovery, optional admin settings by npub, and
  Pollen transfer support.
releaseNotes: >-
  Alpha package scaffold for the Umbrel target. Device install UAT is still required before this target is complete.
